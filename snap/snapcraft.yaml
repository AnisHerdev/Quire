name: quire
title: Quire
version: "1.0.0+3"
summary: Your notes, everywhere — connected to Google Drive
description: |
  Quire connects to your Google Drive and indexes all your academic notes —
  PDFs, PowerPoints, Word documents, and text files. Search everything
  instantly with full-text BM25 search. Your files stay in your own Google
  Drive; nothing is uploaded to a server. Perfect for students who want to
  find their notes fast.

license: GPL-3.0
contact: https://github.com/anomalyco/Quire
issues: https://github.com/anomalyco/Quire/issues
source-code: https://github.com/anomalyco/Quire
website: https://github.com/anomalyco/Quire

base: core22
confinement: strict
grade: stable

apps:
  quire:
    command: quire
    extensions: [gnome]
    plugs:
      - network
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - home

slots:
  dbus-quire:
    interface: dbus
    bus: session
    name: com.quire.app

parts:
  quire:
    plugin: nil
    source: .
    override-build: |
      set -e
      SRC="$SNAPCRAFT_PROJECT_DIR/build/linux/x64/release/bundle"
      if [ ! -f "$SRC/quire" ]; then
        echo "ERROR: Flutter binary not found at $SRC/quire"
        echo "Run scripts/build-snap.sh first to build the Flutter app."
        exit 1
      fi
      install -D -m755 "$SRC/quire" "$SNAPCRAFT_PART_INSTALL/quire"
      cp -r "$SRC/data" "$SNAPCRAFT_PART_INSTALL/"
      install -d "$SNAPCRAFT_PART_INSTALL/lib"
      for so in "$SRC"/lib/*.so; do
        name=$(basename "$so")
        case "$name" in
          libflutter_linux_gtk.so|libapp.so|*_plugin.so|libpdfium.so)
            install -D -m644 -t "$SNAPCRAFT_PART_INSTALL/lib/" "$so"
            ;;
        esac
      done
